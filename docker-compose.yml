version: '3.8'

services:
  cassandra-node1:
    image: cassandra:latest
    container_name: cassandra-node1
    ports:
      - "9042:9042"  # Puerto nativo para conectar cqlsh desde tu máquina
    environment:
      - CASSANDRA_CLUSTER_NAME=NetflixTracingCluster
      - CASSANDRA_DC=DC1
      - CASSANDRA_RACK=Rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
    volumes:
      - ./data/nodo1:/var/lib/cassandra
    networks:
      - cassandra-net

  cassandra-node2:
    image: cassandra:latest
    container_name: cassandra-node2
    environment:
      - CASSANDRA_CLUSTER_NAME=NetflixTracingCluster
      - CASSANDRA_DC=DC1
      - CASSANDRA_RACK=Rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_SEEDS=cassandra-node1
    volumes:
      - ./data/nodo2:/var/lib/cassandra
    networks:
      - cassandra-net
    depends_on:
      - cassandra-node1

  cassandra-node3:
    image: cassandra:latest
    container_name: cassandra-node3
    environment:
      - CASSANDRA_CLUSTER_NAME=NetflixTracingCluster
      - CASSANDRA_DC=DC1
      - CASSANDRA_RACK=Rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_SEEDS=cassandra-node1
    volumes:
      - ./data/nodo3:/var/lib/cassandra
    networks:
      - cassandra-net
    depends_on:
      - cassandra-node2

networks:
  cassandra-net:
    driver: bridge